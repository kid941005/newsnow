services:
  newsnow:
    image: kid941005/newsnow:latest
    container_name: newsnow
    ports:
      - '4444:4444'
    volumes:
      - ./newsnow_data:/usr/app/.data
    environment:
      - HOST=0.0.0.0
      - PORT=4444
      - NODE_ENV=production
      - JWT_SECRET=your-secret
      - INIT_TABLE=true
      - ENABLE_CACHE=true
      - PRODUCTHUNT_API_TOKEN=

volumes:
  newsnow_data:
    name: newsnow_data
